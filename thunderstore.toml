[package]
name = "RetryAnywhere"
namespace = "doombubbles"
description = "Makes the Retry Round button show up and be usable in all modes."
websiteUrl = "https://github.com/doombubbles/RetryAnywhere"

[package.dependencies]
LavaGang-MelonLoader = "0.7.3"
doombubbles-Btd6ModHelper = "3.6.5"

[build]
icon = "./Icon.png"
readme = "./README.md"
outdir = "bin"

[[build.copy]]
source = "./bin/Release/RetryAnywhere.dll"
target = "RetryAnywhere.dll"

[[build.copy]]
source = "./CHANGELOG.md"
target = "./CHANGELOG.md"

[[build.copy]]
source = "./LICENSE"
target = "./LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = ["bloons-td-6"]
categories = ["mods"]
